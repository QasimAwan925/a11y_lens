name: a11y_lens
description: A lightweight, dependency-free accessibility toolkit for Flutter. Catch color contrast and tap-target issues at debug time, before they ship.
version: 0.1.2
homepage: https://github.com/YOUR_USERNAME/a11y_lens
repository: https://github.com/YOUR_USERNAME/a11y_lens
issue_tracker: https://github.com/YOUR_USERNAME/a11y_lens/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true